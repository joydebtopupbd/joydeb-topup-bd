<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Joydeb Topup BD</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.login-box{
    width:90%;
    max-width:400px;
    margin:40px auto;
    background:#fff;
    border-radius:15px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.logo{
    text-align:center;
    font-size:30px;
    margin-bottom:10px;
}

h2{
    text-align:center;
    color:#ff5722;
}

p{
    text-align:center;
    color:#666;
}

input{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:17px;
    cursor:pointer;
}

.login-btn{
    background:#ff5722;
    color:white;
}

.google-btn{
    background:white;
    border:1px solid #ccc;
}

.register{
    text-align:center;
    margin-top:20px;
}

.register a{
    color:#ff5722;
    text-decoration:none;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="login-box">

<div class="logo">🔥</div>

<h2>Joydeb Topup BD</h2>

<p>Login to your account</p>

<input type="text" placeholder="Email or Phone Number">

<input type="password" placeholder="Password">

<button class="login-btn">Login</button>

<button class="google-btn">Login with Google</button>

<div class="register">
Don't have an account?
<a href="register.html">Register</a>
</div>

</div>

<script src="auth.js"></script>

</body>
  </html>
