<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Joydeb Topup BD</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.register-box{
    width:90%;
    max-width:400px;
    margin:30px auto;
    background:#fff;
    border-radius:15px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.logo{
    text-align:center;
    font-size:30px;
    margin-bottom:10px;
}

h2{
    text-align:center;
    color:#ff5722;
}

p{
    text-align:center;
    color:#666;
}

input{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:17px;
    cursor:pointer;
}

.register-btn{
    background:#ff5722;
    color:white;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    color:#ff5722;
    text-decoration:none;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="register-box">

<div class="logo">🔥</div>

<h2>Create Account</h2>

<p>Joydeb Topup BD</p>

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email Address">

<input type="tel" placeholder="Phone Number">

<input type="password" placeholder="Create Password">

<input type="password" placeholder="Confirm Password">

<button class="register-btn">Create Account</button>

<div class="login-link">
Already have an account?
<a href="login.html">Login</a>
</div>

</div>

<script src="auth.js"></script>

</body>
</html>
