<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet - Joydeb Topup BD</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.header{
    background:#ff5722;
    color:#fff;
    text-align:center;
    padding:20px;
}

.wallet-card{
    width:90%;
    max-width:420px;
    margin:20px auto;
    background:#fff;
    border-radius:15px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.balance{
    font-size:38px;
    color:#ff5722;
    font-weight:bold;
    margin:15px 0;
}

.btn{
    display:block;
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.add{
    background:#ff5722;
    color:#fff;
}

.history{
    background:#2196F3;
    color:#fff;
}

.home{
    background:#4CAF50;
    color:#fff;
}

.list{
    width:90%;
    max-width:420px;
    margin:20px auto;
    background:#fff;
    border-radius:15px;
    padding:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.item{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
    padding:12px 0;
}

.item:last-child{
    border:none;
}
</style>
</head>

<body>

<div class="header">
<h2>Wallet</h2>
</div>

<div class="wallet-card">

<h3>Current Balance</h3>

<div class="balance">৳ 0</div>

<button class="btn add" onclick="location.href='add-money.html'">
➕ Add Money
</button>

<button class="btn history">
📜 Transaction History
</button>

<button class="btn home" onclick="location.href='index.html'">
🏠 Home
</button>

</div>

<div class="list">

<h3>Recent Transactions</h3>

<div class="item">
<span>No transactions yet</span>
<span>৳0</span>
</div>

</div>

<script src="wallet.js"></script>

</body>
</html>
