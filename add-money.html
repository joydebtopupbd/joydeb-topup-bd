<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Money - Joydeb Topup BD</title>

<link rel="stylesheet" href="style.css">

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.header{
background:#ff5722;
color:white;
padding:18px;
text-align:center;
}

.box{
width:90%;
max-width:400px;
margin:25px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 4px 10px #ccc;
}

input{
width:100%;
padding:15px;
font-size:18px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:17px;
background:#ff5722;
color:white;
}

.back{
background:#333;
}
</style>

</head>

<body>

<div class="header">
<h2>💰 Add Money</h2>
</div>


<div class="box">

<h3>Enter Amount</h3>

<input 
type="number"
id="amount"
placeholder="Enter Amount ৳">


<button onclick="continuePayment()">
Continue
</button>


<button class="back" onclick="history.back()">
⬅ Back
</button>


</div>


<script>

function continuePayment(){

let amount=document.getElementById("amount").value;


if(amount==""){

alert("Amount লিখুন");

return;

}


localStorage.setItem("amount",amount);


window.location.href="payment.html";


}

</script>


</body>
</html>
