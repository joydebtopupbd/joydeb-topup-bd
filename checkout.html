<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout - Joydeb Topup BD</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

.header{
background:#ff5722;
color:white;
text-align:center;
padding:20px;
}

.box{
width:90%;
max-width:420px;
margin:20px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 4px 10px #ccc;
}

.info{
background:#eee;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:17px;
background:#ff5722;
color:white;
}

.back{
background:#333;
}

</style>

</head>


<body>


<div class="header">
<h2>🛒 Order Checkout</h2>
</div>



<div class="box">


<div class="info">

<h3 id="product">
Product Name
</h3>

<h2>
৳<span id="price">0</span>
</h2>

</div>






<button onclick="confirmOrder()">
Confirm Order
</button>


<button class="back" onclick="history.back()">
⬅ Back
</button>



</div><label>🎮 Free Fire UID</label>

<input
type="number"
id="uid"
placeholder="Enter your UID">

<br><br>

<label>🌍 Server</label>

<select id="server">

<option value="Bangladesh">Bangladesh</option>

<option value="Singapore">Singapore</option>

<option value="India">India</option>

<option value="Middle East">Middle East</option>

<option value="Brazil">Brazil</option>

</select>

<br><br>

<label>👤 Player Name (Optional)</label>

<input
type="text"
id="player"
placeholder="Enter Player Name">




<script>


let product = localStorage.getItem("product") || "Offer";

let price = localStorage.getItem("price") || "0";


document.getElementById("product").innerHTML = product;

document.getElementById("price").innerHTML = price;



function confirmOrder(){


let uid=document.getElementById("uid").value;



if(uid==""){

alert("UID লিখুন");

return;

}



let message =

`Joydeb Topup BD Order

Product: ${product}

Price: ৳${price}

Free Fire UID: ${uid}

Please Complete My Order.`;



window.open(
"https://wa.me/8801981571121?text="+encodeURIComponent(message)
);



}


</script>


</body>

</html>
