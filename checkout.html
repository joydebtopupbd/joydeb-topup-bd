<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout - Joydeb Topup BD</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}


.header{
    background:#ff5722;
    color:white;
    text-align:center;
    padding:18px;
    font-size:22px;
    font-weight:bold;
}


.box{
    width:90%;
    max-width:420px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}


.info{
    background:#fafafa;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}


input{

    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;

}


button{

    width:100%;
    padding:15px;
    margin-top:15px;
    background:#ff5722;
    color:white;
    border:none;
    border-radius:10px;
    font-size:17px;

}

</style>

</head>


<body>


<div class="header">
🛒 Checkout
</div>


<div class="box">


<div class="info">

<h3 id="product">
Product Name
</h3>

<h2 id="price">
৳0
</h2>

</div>



<label>
Free Fire UID
</label>


<input 
type="number"
id="uid"
placeholder="Enter UID">



<button onclick="confirmOrder()">
Confirm Order
</button>



</div>



<script>


let product = localStorage.getItem("product");

let price = localStorage.getItem("price");


document.getElementById("product").innerHTML = product || "No Product";

document.getElementById("price").innerHTML = "৳" + (price || "0");



function confirmOrder(){


let uid = document.getElementById("uid").value;


if(uid==""){

alert("Please enter UID");

return;

}



let message =

`Joydeb Topup BD Order

Product: ${product}

Price: ৳${price}

Free Fire UID: ${uid}

Please Confirm My Order.`;



window.open(

"https://wa.me/8801981571121?text="

+ encodeURIComponent(message)

);



}


</script>


</body>

</html>
