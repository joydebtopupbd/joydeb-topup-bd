<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment - Joydeb Topup BD</title>

<link rel="stylesheet" href="style.css">

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

.header{
background:#ff5722;
color:#fff;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.box{
width:90%;
max-width:420px;
margin:20px auto;
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.method{
display:flex;
gap:10px;
margin-bottom:20px;
}

.method button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.bkash{
background:#e2136e;
color:#fff;
}

.nagad{
background:#f57c00;
color:#fff;
}

.info{
background:#fafafa;
padding:15px;
border-radius:10px;
margin:15px 0;
}

input{
width:100%;
padding:14px;
font-size:17px;
border:1px solid #ccc;
border-radius:10px;
box-sizing:border-box;
}

.copy{
width:100%;
margin-top:10px;
padding:12px;
background:#2196F3;
color:#fff;
border:none;
border-radius:10px;
}

.verify{
width:100%;
margin-top:15px;
padding:15px;
background:#4CAF50;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
}
</style>

</head>
<body>

<div class="header">
Payment
</div>

<div class="box">

<div class="method">
<button class="bkash" onclick="setMethod('bKash')">bKash</button>
<button class="nagad" onclick="setMethod('Nagad')">Nagad</button>
</div>

<div class="info">
<b>Amount:</b>
<span id="amount">৳0</span>
</div>

<div class="info">
<b>Send Money To:</b><br>
<span id="number">01741218883</span>
</div>

<button class="copy" onclick="copyNumber()">
Copy Number
</button>

<br><br>

<input
type="text"
id="trx"
placeholder="Enter Transaction ID">

<button class="verify" onclick="verifyPayment()">
VERIFY
</button>

</div>

<script>

let paymentMethod="bKash";

document.getElementById("amount").innerHTML="৳"+localStorage.getItem("amount");

function setMethod(method){

paymentMethod=method;

}

function copyNumber(){

navigator.clipboard.writeText("01741218883");

alert("Number Copied");

}

function verifyPayment(){

const amount=localStorage.getItem("amount");

const trx=document.getElementById("trx").value;

if(trx==""){

alert("Please enter Transaction ID");

return;

}

const msg=
`Joydeb Topup BD

Payment Method: ${paymentMethod}

Amount: ৳${amount}

Transaction ID: ${trx}

Please add balance to my wallet.`;

window.open("https://wa.me/8801981571121?text="+encodeURIComponent(msg));

}

</script>

</body>
</html>
