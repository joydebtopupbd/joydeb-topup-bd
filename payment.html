<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment - Joydeb Topup BD</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-bottom:80px;
}


.header{
background:#ff5722;
color:white;
padding:20px;
text-align:center;
}


.box{

width:90%;
max-width:400px;
margin:20px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 4px 10px #ccc;

}


.methods{

display:flex;
gap:10px;

}


.methods button{

flex:1;
padding:14px;
border:none;
border-radius:10px;
color:white;
font-size:16px;

}


.bkash{

background:#e2136e;

}


.nagad{

background:#f57c00;

}


.info{

background:#eee;
padding:15px;
border-radius:10px;
margin-top:15px;

}


input{

width:100%;
padding:14px;
margin-top:15px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
font-size:16px;

}


button{

padding:14px;
border:none;
border-radius:10px;
font-size:16px;

}


.copy{

width:100%;
background:#2196f3;
color:white;
margin-top:10px;

}


.verify{

width:100%;
background:#4caf50;
color:white;
margin-top:15px;

}


.back{

width:100%;
background:#333;
color:white;
margin-top:15px;

}

</style>

</head>


<body>


<div class="header">

<h2>💳 Payment</h2>

</div>



<div class="box">



<h3>Select Payment Method</h3>


<div class="methods">

<button class="bkash" onclick="selectMethod('bKash')">

bKash

</button>


<button class="nagad" onclick="selectMethod('Nagad')">

Nagad

</button>

</div>



<div class="info">

Payment Method:
<b id="method">bKash</b>

<br><br>

Amount:
<b>৳<span id="amount">0</span></b>

<br><br>

Number:
<b id="number">01741218883</b>

</div>



<button class="copy" onclick="copyNumber()">

📋 Copy Number

</button>



<input 
type="text"
id="trx"
placeholder="Transaction ID দিন">



<button class="verify" onclick="verifyPayment()">

VERIFY

</button>


<button class="back" onclick="history.back()">

⬅ Back

</button>



</div>




<script>


let method="bKash";


let amount=localStorage.getItem("amount") || 0;


document.getElementById("amount").innerHTML=amount;



function selectMethod(value){

method=value;

document.getElementById("method").innerHTML=value;


}



function copyNumber(){

navigator.clipboard.writeText("01741218883");

alert("Number Copied");

}



function verifyPayment(){


let trx=document.getElementById("trx").value;



if(trx==""){

alert("Transaction ID দিন");

return;

}



let message=

`Joydeb Topup BD

Payment Method: ${method}

Amount: ৳${amount}

Transaction ID: ${trx}

Please Verify My Payment.`;



window.open(

"https://wa.me/8801981571121?text="+encodeURIComponent(message)

);



}


</script>


</body>

</html>
