<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile - Joydeb Topup BD</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-bottom:80px;
}


.header{

background:#ff5722;
color:white;
padding:20px;
text-align:center;

}


.profile-box{

width:90%;
max-width:400px;
margin:20px auto;
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 4px 10px #ccc;

}


.profile-img{

width:90px;
height:90px;
border-radius:50%;
border:3px solid #ff5722;

}


.name{

font-size:22px;
font-weight:bold;
margin:10px;

}


.balance{

background:#ff5722;
color:white;
padding:15px;
border-radius:10px;
font-size:25px;

}


button{

width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
font-size:16px;

}


.orange{

background:#ff5722;
color:white;

}


.dark{

background:#333;
color:white;

}



.bottom-menu{

position:fixed;
bottom:0;
left:0;
right:0;
height:65px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -3px 10px #ccc;

}


.bottom-menu a{

text-decoration:none;
color:#333;
text-align:center;
font-size:13px;

}

</style>

</head>


<body>


<div class="header">

<h2>👤 My Profile</h2>

</div>



<div class="profile-box">


<img src="https://via.placeholder.com/90" class="profile-img">


<div class="name">
Guest User
</div>


<p>
guest@example.com
</p>



<div class="balance">

৳ 0

</div>



<button class="orange" onclick="location.href='add-money.html'">

➕ Add Money

</button>



<button class="orange" onclick="location.href='orders.html'">

📦 My Orders

</button>



<button class="dark" onclick="history.back()">

⬅ Back

</button>



<button class="dark" onclick="location.href='login.html'">

🚪 Logout

</button>



</div>




<div class="bottom-menu">


<a href="index.html">
🏠<br>
Home
</a>


<a href="orders.html">
📦<br>
Orders
</a>


<a href="wallet.html">
💰<br>

</a>


<a href="profile.html">
👤<br>
Profile
</a>


</div>

</html>
