<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orders - Joydeb Topup BD</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.header{
    background:#ff5722;
    color:white;
    text-align:center;
    padding:18px;
    font-size:22px;
    font-weight:bold;
}

.order-box{
    width:90%;
    max-width:450px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.order{
    background:#fafafa;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    border-left:5px solid #ff5722;
}

.order h3{
    margin:0 0 10px;
    color:#333;
}

.status{
    color:#ff9800;
    font-weight:bold;
}

.back{
    width:90%;
    max-width:450px;
    margin:20px auto;
}

button{
    width:100%;
    padding:14px;
    background:#ff5722;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
}

</style>

</head>


<body>


<div class="header">
📦 My Orders
</div>


<div class="order-box">


<div class="order">

<h3>Free Fire 100 Diamond</h3>

<p>Order ID: #10001</p>

<p>Amount: ৳76</p>

<p class="status">
Status: Pending
</p>

</div>



<div class="order">

<h3>Weekly Membership</h3>

<p>Order ID: #10002</p>

<p>Amount: ৳161</p>

<p class="status">
Status: Complete
</p>

</div>



<div class="order">

<h3>No New Orders</h3>

<p>Your recent orders will appear here.</p>

</div>


</div>


<div class="back">

<button onclick="location.href='index.html'">
🏠 Back Home
</button>

</div>



<script src="order.js"></script>


</body>
</html>
